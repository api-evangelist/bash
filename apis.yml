aid: bash
name: Bash Shell
description: >-
  GNU Bash (Bourne Again SHell) is the default Unix shell and command-line interpreter
  on most Linux distributions and macOS. Developed by Brian Fox for the GNU Project as
  a free replacement for the Bourne shell, Bash provides a rich scripting language with
  variables, control structures, functions, I/O redirection, job control, and process
  management. Bash scripts are the foundational automation tool for system administration,
  CI/CD pipelines, DevOps tooling, and software build systems.
